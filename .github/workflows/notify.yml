name: Shared Notify

on:
  workflow_call:
    secrets:
      webhook:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[ci-skip]') || !contains(github.event.head_commit.message, 'chore:')"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      #- name: Make gradlew executable
      #  run: chmod +x ./gradlew

      - name: Notify Discord
        if: success()
        run: gradle release-build --stacktrace
        env:
          BUILD_WEBHOOK: ${{ secrets.webhook }}
