name: Shared Notify

on:
  workflow_call:
    inputs:
      status:
        required: false
        type: string
        default: "release"
      branch:
        required: true
        type: string

    secrets:
      webhook:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Notify Discord
        if: success()
        run: gradle release-build --stacktrace
        env:
          BUILD_WEBHOOK: ${{ secrets.webhook }}
          version_status: ${{ inputs.status }}